<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayBeat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 500px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        p {
            color: #666;
            margin-bottom: 20px;
        }
        
        .status {
            padding: 20px;
            background: #f0f0f0;
            border-radius: 5px;
            margin-top: 20px;
        }
        
        .status.ok {
            background: #d4edda;
            color: #155724;
        }
        
        button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        
        button:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 PlayBeat</h1>
        <p>Frontend and Backend Application</p>
        <button onclick="checkHealth()">Check API Status</button>
        <div class="status" id="status"></div>
    </div>
    
    <script>
        function checkHealth() {
            fetch('http://localhost:3000/api/health')
                .then(response => response.json())
                .then(data => {
                    const statusDiv = document.getElementById('status');
                    statusDiv.textContent = `Status: ${data.status} ✓`;
                    statusDiv.className = 'status ok';
                })
                .catch(error => {
                    const statusDiv = document.getElementById('status');
                    statusDiv.textContent = `Error: ${error.message}`;
                    statusDiv.className = 'status';
                });
        }
    </script>
</body>
</html>
